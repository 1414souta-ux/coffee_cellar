<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Bean Cellar</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#faf8f5;--bg-card:#fff;--bg-sub:#f2ede6;
  --espresso:#1a0f08;--crema:#b07820;--crema-light:#f5ecd8;
  --text-primary:#1a0f08;--text-secondary:#6b5040;--text-muted:#b0988a;
  --border:rgba(26,15,8,0.08);--border-mid:rgba(26,15,8,0.14);
  --green:#3a6644;--green-bg:#eaf2ec;
  --amber:#9a6010;--amber-bg:#fdf0d8;
  --red:#9a3020;--red-bg:#fcecea;
  --nav-h:68px;
  --proxy:https://notion-proxy.1414souta.workers.dev;
  --stock-db:fd4194d3-b379-4ea8-88b8-e4a8fd2bdc03;
  --log-db:dd4407e7-158d-4c58-b895-bd8d01f90700;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text-primary);font-family:'Playfair Display',serif;overscroll-behavior:none}
.app{display:flex;flex-direction:column;height:100vh;max-width:430px;margin:0 auto}
.screen{flex:1;overflow-y:auto;padding-bottom:calc(var(--nav-h)+12px);display:none}
.screen.active{display:block}

/* HEADER */
.header{padding:52px 20px 14px;position:sticky;top:0;background:var(--bg);z-index:10;border-bottom:0.5px solid var(--border-mid)}
.eyebrow{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:4px;color:var(--crema);text-transform:uppercase;margin-bottom:2px}
.h-title{font-family:'Bebas Neue',sans-serif;font-size:40px;line-height:1;color:var(--espresso);letter-spacing:2px}
.h-title em{color:var(--crema);font-style:normal}
.h-sub{font-family:'Space Mono',monospace;font-size:10px;color:var(--text-muted);margin-top:3px;letter-spacing:.5px}

/* NAV */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#fff;border-top:0.5px solid var(--border-mid);display:flex;z-index:20;height:var(--nav-h)}
.nav-btn{flex:1;padding:10px 0 16px;background:none;border:none;color:var(--text-muted);font-family:'Space Mono',monospace;font-size:8px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:5px;transition:color .15s}
.nav-btn.active{color:var(--crema)}
.nav-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}

/* CARDS */
.list{padding:16px;display:flex;flex-direction:column;gap:10px}
.card{background:var(--bg-card);border:0.5px solid var(--border-mid);border-radius:16px;padding:18px;cursor:pointer;transition:transform .1s}
.card:active{transform:scale(0.985)}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
.bean-name{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:var(--text-primary);line-height:1.3;flex:1;margin-right:10px}
.status-badge{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:1px;padding:3px 8px;border-radius:99px;flex-shrink:0;font-weight:700;text-transform:uppercase}
.s-ok{background:var(--green-bg);color:var(--green)}
.s-low{background:var(--amber-bg);color:var(--amber)}
.s-done{background:var(--bg-sub);color:var(--text-muted)}
.meta{font-family:'Space Mono',monospace;font-size:10px;color:var(--text-muted);margin-bottom:12px;letter-spacing:.5px}
.badges{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}
.badge{font-family:'Space Mono',monospace;font-size:9px;padding:2px 7px;border-radius:4px;background:var(--bg-sub);color:var(--text-secondary)}
.grams-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.grams-num{font-family:'Bebas Neue',sans-serif;font-size:36px;color:var(--espresso);line-height:1;letter-spacing:1px}
.grams-num sub{font-size:16px;color:var(--text-muted)}
.grams-of{font-family:'Space Mono',monospace;font-size:10px;color:var(--text-muted)}
.prog-track{height:4px;background:var(--bg-sub);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;transition:width .4s}
.fill-hi{background:var(--green)}.fill-md{background:var(--crema)}.fill-lo{background:var(--red)}
.card-memo{font-family:'Playfair Display',serif;font-style:italic;font-size:12px;color:var(--text-muted);margin-top:10px;padding-top:10px;border-top:0.5px solid var(--border);line-height:1.6}

/* EMPTY / LOADING */
.empty{text-align:center;padding:64px 24px}
.empty-icon{font-size:36px;margin-bottom:12px;opacity:.25}
.empty-txt{font-family:'Space Mono',monospace;font-size:11px;color:var(--text-muted);letter-spacing:1px;line-height:2.2}
.skeleton{background:linear-gradient(90deg,var(--bg-sub) 25%,var(--bg-card) 50%,var(--bg-sub) 75%);background-size:200% 100%;animation:shimmer 1.2s infinite;border-radius:8px;height:20px;margin-bottom:8px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skeleton-card{background:var(--bg-card);border:0.5px solid var(--border-mid);border-radius:16px;padding:18px;margin-bottom:10px}

/* STOCK MODAL */
.overlay{position:fixed;inset:0;background:rgba(26,15,8,.35);z-index:50;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(2px)}
.overlay.open{display:flex}
.sheet{background:#fff;border-radius:24px 24px 0 0;padding:20px 24px 44px;width:100%;max-width:430px;max-height:90vh;overflow-y:auto}
.handle{width:36px;height:4px;background:var(--border-mid);border-radius:2px;margin:0 auto 22px}
.sheet-title{font-family:'Playfair Display',serif;font-size:19px;font-weight:700;color:var(--text-primary);margin-bottom:3px;line-height:1.3}
.sheet-sub{font-family:'Space Mono',monospace;font-size:10px;color:var(--text-muted);margin-bottom:20px}
.slabel{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:3px;color:var(--crema);text-transform:uppercase;margin-bottom:8px}
.big-input-wrap{position:relative;margin-bottom:14px}
.big-input{width:100%;background:var(--bg);border:1px solid var(--border-mid);border-radius:12px;padding:14px 50px 14px 16px;font-family:'Bebas Neue',sans-serif;font-size:36px;color:var(--espresso);-webkit-appearance:none}
.big-input:focus{outline:none;border-color:var(--crema)}
.big-unit{position:absolute;right:16px;top:50%;transform:translateY(-50%);font-family:'Space Mono',monospace;font-size:12px;color:var(--text-muted)}
.quick-row{display:flex;gap:8px;margin-bottom:20px}
.qbtn{flex:1;padding:9px 0;background:var(--bg-sub);border:none;border-radius:10px;font-family:'Space Mono',monospace;font-size:11px;color:var(--text-secondary);cursor:pointer}
.qbtn:active{background:var(--crema-light);color:var(--crema)}
.memo-area{width:100%;background:var(--bg);border:0.5px solid var(--border-mid);border-radius:10px;padding:10px 14px;font-family:'Playfair Display',serif;font-style:italic;font-size:14px;color:var(--text-secondary);resize:none;min-height:60px;line-height:1.5;margin-bottom:18px}
.memo-area:focus{outline:none;border-color:var(--crema)}
.row-btns{display:flex;gap:10px}
.btn-cancel{flex:1;padding:14px;background:var(--bg-sub);border:none;border-radius:12px;font-family:'Space Mono',monospace;font-size:11px;color:var(--text-secondary);cursor:pointer;letter-spacing:1px}
.btn-save{flex:2;padding:14px;background:var(--espresso);border:none;border-radius:12px;font-family:'Bebas Neue',sans-serif;font-size:22px;color:#fff;cursor:pointer;letter-spacing:2px}
.btn-save:active,.btn-primary:active{opacity:.85}
.btn-archive{width:100%;padding:12px;background:none;border:0.5px solid var(--border-mid);border-radius:12px;font-family:'Space Mono',monospace;font-size:10px;color:var(--text-muted);cursor:pointer;margin-top:10px;letter-spacing:1px}
.btn-archive:active{color:var(--red);border-color:var(--red)}

/* FORMS */
.form-wrap{padding:20px}
.fg{margin-bottom:14px}
.fl{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2.5px;color:var(--crema);text-transform:uppercase;margin-bottom:6px;display:block}
.fi{width:100%;background:#fff;border:0.5px solid var(--border-mid);border-radius:10px;padding:12px 14px;font-family:'Playfair Display',serif;font-size:15px;color:var(--text-primary);-webkit-appearance:none}
.fi:focus{outline:none;border-color:var(--crema)}
.fi::placeholder{color:var(--text-muted)}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fs{width:100%;background:#fff;border:0.5px solid var(--border-mid);border-radius:10px;padding:12px 14px;font-family:'Space Mono',monospace;font-size:11px;color:var(--text-primary);-webkit-appearance:none;cursor:pointer}
.fs:focus{outline:none;border-color:var(--crema)}
.roaster-wrap{display:flex;gap:8px;align-items:center}
.roaster-tag{font-family:'Space Mono',monospace;font-size:11px;background:var(--espresso);color:#fff;border-radius:8px;padding:10px 14px;white-space:nowrap;flex-shrink:0}
.roaster-free{flex:1;background:#fff;border:0.5px solid var(--border-mid);border-radius:10px;padding:12px 14px;font-family:'Playfair Display',serif;font-size:15px;color:var(--text-primary);-webkit-appearance:none}
.roaster-free:focus{outline:none;border-color:var(--crema)}
.roaster-free::placeholder{color:var(--text-muted)}
.btn-primary{width:100%;padding:16px;background:var(--espresso);border:none;border-radius:12px;font-family:'Bebas Neue',sans-serif;font-size:22px;color:#fff;cursor:pointer;letter-spacing:2px;margin-top:8px}
.btn-primary.busy{opacity:.6;pointer-events:none}

/* LOG */
.picker-row{display:flex;gap:8px;overflow-x:auto;padding:0 0 4px;margin-bottom:4px;scrollbar-width:none}
.picker-row::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:7px 12px;border:0.5px solid var(--border-mid);border-radius:99px;font-family:'Space Mono',monospace;font-size:10px;color:var(--text-secondary);background:#fff;cursor:pointer;white-space:nowrap}
.chip.on{background:var(--espresso);color:#fff;border-color:var(--espresso)}
.chip.free-chip{border-style:dashed}
.place-row{display:flex;gap:8px}
.pchip{flex:1;padding:9px 0;border:0.5px solid var(--border-mid);border-radius:10px;font-family:'Space Mono',monospace;font-size:10px;color:var(--text-secondary);background:#fff;cursor:pointer;text-align:center}
.pchip.on{background:var(--espresso);color:#fff;border-color:var(--espresso)}
.log-card{background:#fff;border:0.5px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:8px}
.lc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
.lc-name{font-family:'Playfair Display',serif;font-size:14px;font-weight:700;color:var(--text-primary);line-height:1.3;flex:1;margin-right:8px}
.lc-g{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--crema);letter-spacing:1px;white-space:nowrap}
.lc-g sub{font-size:11px}
.lc-meta{font-family:'Space Mono',monospace;font-size:10px;color:var(--text-muted);margin-bottom:4px}
.lc-memo{font-family:'Playfair Display',serif;font-style:italic;font-size:12px;color:var(--text-muted);line-height:1.5}
.sec-label{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:3px;color:var(--text-muted);text-transform:uppercase;padding:16px 16px 8px}

/* DONE */
.done-section{padding:0 16px}
.done-card{background:#fff;border:0.5px solid var(--border);border-radius:14px;padding:16px;margin-bottom:10px;opacity:.7}
.done-name{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:var(--text-secondary);margin-bottom:3px}
.done-meta{font-family:'Space Mono',monospace;font-size:10px;color:var(--text-muted);margin-bottom:8px}
.done-memo{font-family:'Playfair Display',serif;font-style:italic;font-size:12px;color:var(--text-muted);line-height:1.5;margin-bottom:10px;padding-top:8px;border-top:0.5px solid var(--border)}
.done-acts{display:flex;gap:8px}
.btn-restore{flex:1;padding:8px 0;background:none;border:0.5px solid var(--border-mid);border-radius:8px;font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1px;color:var(--crema);cursor:pointer;text-align:center}
.btn-del{padding:8px 14px;background:none;border:0.5px solid var(--border-mid);border-radius:8px;font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1px;color:var(--text-muted);cursor:pointer}
.btn-del:active{color:var(--red);border-color:var(--red)}

/* NOTION STATUS BAR */
.nbar{display:flex;align-items:center;gap:6px;padding:8px 16px;font-family:'Space Mono',monospace;font-size:10px;color:var(--text-muted);border-bottom:0.5px solid var(--border)}
.ndot{width:6px;height:6px;border-radius:50%;background:var(--text-muted);flex-shrink:0;transition:background .3s}
.ndot.ok{background:var(--green)}
.ndot.err{background:var(--red)}
.nsetup-btn{margin-left:auto;font-family:'Space Mono',monospace;font-size:9px;color:var(--crema);background:none;border:0.5px solid var(--border-mid);border-radius:6px;padding:3px 8px;cursor:pointer;letter-spacing:1px}

/* TOAST */
.toast{position:fixed;bottom:calc(var(--nav-h)+12px);left:50%;transform:translateX(-50%) translateY(10px);background:var(--espresso);border-radius:10px;padding:10px 20px;font-family:'Space Mono',monospace;font-size:11px;color:#fff;letter-spacing:1px;z-index:60;opacity:0;transition:all .22s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="app">

  <!-- STOCK -->
  <div class="screen active" id="sc-stock">
    <div class="header">
      <div class="eyebrow">Bean Cellar</div>
      <div class="h-title">STOCK <em id="stock-count">—</em></div>
      <div class="h-sub" id="stock-sub">—</div>
    </div>
    <div class="list" id="stock-list"></div>
  </div>

  <!-- LOG -->
  <div class="screen" id="sc-log">
    <div class="header">
      <div class="eyebrow">Bean Cellar</div>
      <div class="h-title">LOG <em>IT</em></div>
      <div class="h-sub" id="log-sub">—</div>
    </div>
    <div class="nbar">
      <div class="ndot" id="ndot"></div>
      <span id="nstatus">Notion未接続</span>
      <button class="nsetup-btn" onclick="setupNotion()">接続設定</button>
    </div>
    <div class="form-wrap" style="padding-bottom:8px">
      <div class="fg">
        <label class="fl">Bean</label>
        <div class="picker-row" id="bean-picker"></div>
        <input class="fi" id="log-free" type="text" placeholder="または名前を入力" style="margin-top:8px;display:none">
      </div>
      <div class="fg">
        <label class="fl">Grams used</label>
        <div style="position:relative">
          <input class="fi" id="log-g" type="number" placeholder="17" min="1" inputmode="numeric" style="padding-right:36px">
          <span style="position:absolute;right:14px;top:50%;transform:translateY(-50%);font-family:'Space Mono',monospace;font-size:12px;color:var(--text-muted)">g</span>
        </div>
      </div>
      <div class="fg">
        <label class="fl">Place</label>
        <div class="place-row">
          <button class="pchip on" data-place="家" onclick="selPlace(this)">家</button>
          <button class="pchip" data-place="カフェ" onclick="selPlace(this)">カフェ</button>
          <button class="pchip" data-place="外（職場・移動中など）" onclick="selPlace(this)">外</button>
        </div>
      </div>
      <div class="fg">
        <label class="fl">Memo</label>
        <input class="fi" id="log-memo" type="text" placeholder="味・気分・シーンなど">
      </div>
      <button class="btn-primary" id="btn-record">RECORD</button>
    </div>
    <div class="sec-label">Recent</div>
    <div id="log-hist" style="padding:0 16px"></div>
  </div>

  <!-- NEW -->
  <div class="screen" id="sc-new">
    <div class="header">
      <div class="eyebrow">Bean Cellar</div>
      <div class="h-title">NEW <em>BEAN</em></div>
    </div>
    <div class="form-wrap">
      <div class="fg"><label class="fl">Bean Name</label>
        <input class="fi" id="n-name" type="text" placeholder="例：エチオピア タラトゥ"></div>
      <div class="fg"><label class="fl">Roaster</label>
        <div class="roaster-wrap">
          <span class="roaster-tag">obscura</span>
          <input class="roaster-free" id="n-roaster" type="text" placeholder="または他のロースター名">
        </div>
      </div>
      <div class="f2">
        <div class="fg"><label class="fl">Roast Date</label>
          <input class="fi" id="n-date" type="date"></div>
        <div class="fg"><label class="fl">Grams</label>
          <input class="fi" id="n-g" type="number" placeholder="200" min="1"></div>
      </div>
      <div class="f2">
        <div class="fg"><label class="fl">Roast Level</label>
          <select class="fs" id="n-level">
            <option value="">—</option>
            <option>浅煎り</option><option>中浅煎り</option><option>中煎り</option>
            <option>中深煎り</option><option>深煎り</option>
          </select></div>
        <div class="fg"><label class="fl">Process</label>
          <select class="fs" id="n-process">
            <option value="">—</option>
            <option>Washed</option><option>Natural</option><option>Honey</option><option>その他</option>
          </select></div>
      </div>
      <div class="fg"><label class="fl">Memo</label>
        <input class="fi" id="n-memo" type="text" placeholder="抽出メモや購入理由など"></div>
      <button class="btn-primary" id="btn-add">ADD TO STOCK</button>
    </div>
  </div>

  <!-- DONE -->
  <div class="screen" id="sc-done">
    <div class="header">
      <div class="eyebrow">Bean Cellar</div>
      <div class="h-title">ALL <em>DONE</em></div>
    </div>
    <div style="height:12px"></div>
    <div class="done-section" id="done-list"></div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-btn active" onclick="go('stock')">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Stock
    </button>
    <button class="nav-btn" onclick="go('log')">
      <svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>Log
    </button>
    <button class="nav-btn" onclick="go('new')">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>New
    </button>
    <button class="nav-btn" onclick="go('done')">
      <svg viewBox="0 0 24 24"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg>Done
    </button>
  </nav>
</div>

<!-- UPDATE MODAL -->
<div class="overlay" id="modal">
  <div class="sheet">
    <div class="handle"></div>
    <div class="sheet-title" id="m-name">—</div>
    <div class="sheet-sub" id="m-meta">—</div>
    <div class="slabel">Remaining Grams</div>
    <div class="big-input-wrap">
      <input class="big-input" id="m-g" type="number" min="0" inputmode="numeric">
      <span class="big-unit">g</span>
    </div>
    <div class="quick-row">
      <button class="qbtn" onclick="subG(13)">−13g</button>
      <button class="qbtn" onclick="subG(14)">−14g</button>
      <button class="qbtn" onclick="subG(16)">−16g</button>
      <button class="qbtn" onclick="subG(18)">−18g</button>
    </div>
    <div class="slabel" style="margin-top:4px">Memo</div>
    <textarea class="memo-area" id="m-memo" placeholder="メモを編集…"></textarea>
    <div class="row-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" id="btn-modal-save" onclick="saveModal()">SAVE</button>
    </div>
    <button class="btn-archive" onclick="archiveBean()">All done — move to archive</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── CONFIG ──
const PROXY   = 'https://notion-proxy.1414souta.workers.dev';
const STOCK_DB = '77a292ef-511d-41c0-857b-62cd8c15a851';
const LOG_DB   = '38b285ba-a83a-801a-96f7-cd614dcd877e';
const TK = 'notion_token_v2';
const LOG_LK = 'bean_log_v4'; // local log cache

const getToken = () => localStorage.getItem(TK) || '';
const loadLogCache = () => { try{return JSON.parse(localStorage.getItem(LOG_LK)||'[]')}catch{return[]} };
const saveLogCache = d => localStorage.setItem(LOG_LK, JSON.stringify(d));

// ── NOTION API ──
async function nAPI(method, path, body) {
  const token = getToken();
  if (!token) return null;
  try {
    const r = await fetch(PROXY + path, {
      method,
      headers: {
        'Authorization': 'Bearer ' + token,
        'Notion-Version': '2022-06-28',
        'Content-Type': 'application/json'
      },
      body: body ? JSON.stringify(body) : undefined
    });
    if (!r.ok) { console.error(r.status, await r.text()); return null; }
    return r.json();
  } catch(e) { console.error(e); return null; }
}

// ── STOCK: READ from Notion ──
async function fetchStock() {
  const res = await nAPI('POST', '/v1/databases/' + STOCK_DB + '/query', {
    filter: { property: 'ステータス', select: { does_not_equal: '使い切り' } },
    sorts: [{ timestamp: 'created_time', direction: 'descending' }],
    page_size: 100
  });
  if (!res) return null;
  return res.results.map(p => ({
    id: p.id,
    name: p.properties['豆の名前']?.title?.[0]?.plain_text || '',
    roaster: p.properties['ロースター']?.select?.name || '',
    roastDate: p.properties['焙煎日']?.date?.start || '',
    totalGrams: p.properties['購入グラム']?.number || 0,
    remainGrams: p.properties['残量（g）']?.number ?? 0,
    roastLevel: p.properties['焙煎度']?.select?.name || '',
    process: p.properties['精製方法']?.select?.name || '',
    status: p.properties['ステータス']?.select?.name || 'IN STOCK',
    memo: p.properties['メモ']?.rich_text?.[0]?.plain_text || ''
  }));
}

async function fetchDone() {
  const res = await nAPI('POST', '/v1/databases/' + STOCK_DB + '/query', {
    filter: { property: 'ステータス', select: { equals: '使い切り' } },
    sorts: [{ timestamp: 'last_edited_time', direction: 'descending' }],
    page_size: 50
  });
  if (!res) return null;
  return res.results.map(p => ({
    id: p.id,
    name: p.properties['豆の名前']?.title?.[0]?.plain_text || '',
    roaster: p.properties['ロースター']?.select?.name || '',
    totalGrams: p.properties['購入グラム']?.number || 0,
    roastLevel: p.properties['焙煎度']?.select?.name || '',
    process: p.properties['精製方法']?.select?.name || '',
    memo: p.properties['メモ']?.rich_text?.[0]?.plain_text || ''
  }));
}

// ── STOCK: WRITE to Notion ──
async function updateStock(pageId, remainGrams, memo, status) {
  const statusMap = { 'IN STOCK': '在庫あり', 'LOW': '残り少ない', 'DONE': '使い切り' };
  return nAPI('PATCH', '/v1/pages/' + pageId, {
    properties: {
      '残量（g）': { number: remainGrams },
      'メモ': { rich_text: [{ text: { content: memo || '' } }] },
      'ステータス': { select: { name: statusMap[status] || '在庫あり' } }
    }
  });
}

async function createStock(bean) {
  const props = {
    '豆の名前': { title: [{ text: { content: bean.name } }] },
    '購入グラム': { number: bean.totalGrams },
    '残量（g）': { number: bean.totalGrams },
    'ステータス': { select: { name: '在庫あり' } }
  };
  if (bean.roaster) props['ロースター'] = { select: { name: bean.roaster } };
  if (bean.roastDate) props['焙煎日'] = { date: { start: bean.roastDate } };
  if (bean.roastLevel) props['焙煎度'] = { select: { name: bean.roastLevel } };
  if (bean.process) props['精製方法'] = { select: { name: bean.process } };
  if (bean.memo) props['メモ'] = { rich_text: [{ text: { content: bean.memo } }] };
  return nAPI('POST', '/v1/pages', { parent: { database_id: STOCK_DB }, properties: props });
}

async function deleteStock(pageId) {
  return nAPI('PATCH', '/v1/pages/' + pageId, { archived: true });
}

// ── LOG: WRITE to Notion ──
async function createLog(entry) {
  const props = {
    'コーヒーの名前': { title: [{ text: { content: entry.name } }] },
    'ひとことメモ': { rich_text: [{ text: { content: entry.memo || '' } }] },
    '記録日時': { date: { start: new Date().toISOString() } }
  };
  if (entry.place) props['飲んだ場所'] = { select: { name: entry.place } };
  if (entry.grams) props['使用グラム'] = { number: entry.grams };
  if (entry.roaster) props['ロースター'] = { select: { name: entry.roaster } };
  if (entry.roastLevel) props['焙煎度'] = { select: { name: entry.roastLevel } };
  if (entry.process) props['精製方法'] = { select: { name: entry.process } };
  return nAPI('POST', '/v1/pages', { parent: { database_id: LOG_DB }, properties: props });
}

// ── NOTION STATUS ──
function updateNStatus() {
  const t = getToken();
  const dot = document.getElementById('ndot');
  const txt = document.getElementById('nstatus');
  dot.className = 'ndot' + (t ? ' ok' : '');
  txt.textContent = t ? 'Notion接続済み — 全データ同期' : 'Notion未接続 — トークンを設定してください';
}

function setupNotion() {
  const cur = getToken();
  const t = prompt('Notion Integration Token\n（secret_xxxxx の形式）', cur || '');
  if (t !== null) {
    t.trim() ? localStorage.setItem(TK, t.trim()) : localStorage.removeItem(TK);
    updateNStatus();
    showToast('設定を保存しました');
    if (t.trim()) { loadStock(); loadDone(); }
  }
}

// ── STATE ──
let stockData = [];
let selectedBeanId = null;
let selectedPlace = '家';
let editingPageId = null;
let currentTab = 'stock';

// ── NAVIGATION ──
function go(tab) {
  currentTab = tab;
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('sc-' + tab).classList.add('active');
  document.querySelectorAll('.nav-btn')[['stock','log','new','done'].indexOf(tab)].classList.add('active');
  if (tab === 'stock') loadStock();
  if (tab === 'log') { renderPicker(); renderLogHist(); }
  if (tab === 'done') loadDone();
}

// ── HELPERS ──
const daysSince = d => d ? Math.floor((Date.now() - new Date(d)) / 86400000) : null;
const fillCls = p => p > 50 ? 'fill-hi' : p > 20 ? 'fill-md' : 'fill-lo';

function skeletonHTML() {
  return `<div class="skeleton-card"><div class="skeleton" style="width:60%;height:18px;margin-bottom:12px"></div><div class="skeleton" style="width:40%;height:14px;margin-bottom:16px"></div><div class="skeleton" style="width:100%;height:8px"></div></div>`.repeat(3);
}

// ── STOCK SCREEN ──
async function loadStock() {
  const el = document.getElementById('stock-list');
  el.innerHTML = skeletonHTML();
  if (!getToken()) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">🔑</div><div class="empty-txt">Notionトークンを設定してください<br><br><button onclick="setupNotion()" style="font-family:'Space Mono',monospace;font-size:11px;padding:10px 20px;background:var(--espresso);color:#fff;border:none;border-radius:8px;cursor:pointer;letter-spacing:1px">接続設定</button></div></div>`;
    document.getElementById('stock-count').textContent = '—';
    document.getElementById('stock-sub').textContent = 'Notion未接続';
    return;
  }
  const beans = await fetchStock();
  if (!beans) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-txt">Notionへの接続に失敗しました<br>トークンとCORSプロキシを確認してください</div></div>`;
    return;
  }
  stockData = beans;
  document.getElementById('stock-count').textContent = beans.length;
  const totalG = beans.reduce((s, b) => s + (b.remainGrams || 0), 0);
  document.getElementById('stock-sub').textContent = `${totalG}g remaining · ${beans.length} bean${beans.length !== 1 ? 's' : ''}`;

  if (!beans.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">☕</div><div class="empty-txt">No beans in stock<br>Add one from NEW</div></div>`;
    return;
  }

  el.innerHTML = beans.map(b => {
    const pct = b.totalGrams ? Math.round((b.remainGrams / b.totalGrams) * 100) : 0;
    const days = daysSince(b.roastDate);
    const isLow = b.remainGrams <= b.totalGrams * 0.2;
    const badges = [b.roastLevel, b.process].filter(Boolean);
    const meta = [b.roaster, days !== null ? 'Day ' + days : ''].filter(Boolean).join(' · ');
    const sCls = isLow ? 's-low' : 's-ok';
    const sLabel = isLow ? 'LOW' : 'IN STOCK';
    return `<div class="card" onclick="openModal('${b.id}')">
      <div class="card-top"><div class="bean-name">${b.name}</div><span class="status-badge ${sCls}">${sLabel}</span></div>
      <div class="meta">${meta}</div>
      ${badges.length ? `<div class="badges">${badges.map(t=>`<span class="badge">${t}</span>`).join('')}</div>` : ''}
      <div class="grams-row"><div class="grams-num">${b.remainGrams}<sub>g</sub></div><div class="grams-of">/ ${b.totalGrams}g</div></div>
      <div class="prog-track"><div class="prog-fill ${fillCls(pct)}" style="width:${Math.max(0,pct)}%"></div></div>
      ${b.memo ? `<div class="card-memo">${b.memo}</div>` : ''}
    </div>`;
  }).join('');
}

// ── MODAL ──
function openModal(id) {
  const b = stockData.find(x => x.id === id);
  if (!b) return;
  editingPageId = id;
  document.getElementById('m-name').textContent = b.name;
  const days = daysSince(b.roastDate);
  document.getElementById('m-meta').textContent = [b.roaster, days !== null ? 'Day ' + days : ''].filter(Boolean).join(' · ');
  document.getElementById('m-g').value = b.remainGrams;
  document.getElementById('m-memo').value = b.memo || '';
  document.getElementById('modal').classList.add('open');
  setTimeout(() => document.getElementById('m-g').focus(), 250);
}
function closeModal() { document.getElementById('modal').classList.remove('open'); editingPageId = null; }
function subG(g) { const i = document.getElementById('m-g'); i.value = Math.max(0, parseInt(i.value || 0) - g); }

async function saveModal() {
  if (!editingPageId) return;
  const btn = document.getElementById('btn-modal-save');
  btn.textContent = '...'; btn.classList.add('busy');
  const val = Math.max(0, parseInt(document.getElementById('m-g').value) || 0);
  const memo = document.getElementById('m-memo').value.trim();
  const bean = stockData.find(b => b.id === editingPageId);
  const pct = bean ? val / bean.totalGrams : 1;
  const status = pct <= 0 ? 'DONE' : pct <= 0.2 ? 'LOW' : 'IN STOCK';
  const ok = await updateStock(editingPageId, val, memo, status);
  btn.textContent = 'SAVE'; btn.classList.remove('busy');
  if (ok) { closeModal(); loadStock(); showToast('Updated'); }
  else showToast('保存失敗 — 接続を確認してください');
}

async function archiveBean() {
  if (!editingPageId) return;
  const ok = await updateStock(editingPageId, 0, document.getElementById('m-memo').value.trim(), 'DONE');
  if (ok) { closeModal(); loadStock(); showToast('Archived ☕'); }
  else showToast('更新失敗');
}

document.getElementById('modal').addEventListener('click', e => { if (e.target === document.getElementById('modal')) closeModal(); });

// ── LOG ──
function renderPicker() {
  const active = stockData.filter(b => b.remainGrams > 0);
  const picker = document.getElementById('bean-picker');
  picker.innerHTML = active.map(b =>
    `<button class="chip${selectedBeanId === b.id ? ' on' : ''}" onclick="selBean('${b.id}',this)">${b.name}</button>`
  ).join('') + `<button class="chip free-chip${!selectedBeanId ? ' on' : ''}" onclick="selBean(null,this)">フリー入力</button>`;
  document.getElementById('log-free').style.display = selectedBeanId ? 'none' : 'block';
  document.getElementById('log-sub').textContent = loadLogCache().length + ' records total';
}

function selBean(id, el) {
  selectedBeanId = id;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('on'));
  el.classList.add('on');
  document.getElementById('log-free').style.display = id ? 'none' : 'block';
}

function selPlace(el) {
  selectedPlace = el.dataset.place;
  document.querySelectorAll('.pchip').forEach(c => c.classList.remove('on'));
  el.classList.add('on');
}

async function renderLogHist() {
  const el = document.getElementById('log-hist');
  el.innerHTML = skeletonHTML();
  const res = await nAPI('POST', '/v1/databases/' + LOG_DB + '/query', {
    sorts: [{ timestamp: 'created_time', direction: 'descending' }],
    page_size: 20
  });
  if (!res) {
    // fallback to local cache
    const logs = loadLogCache().slice(0, 20);
    if (!logs.length) { el.innerHTML = '<div class="empty"><div class="empty-icon">📝</div><div class="empty-txt">No logs yet</div></div>'; return; }
    el.innerHTML = logs.map(l => logCardHTML(l.name, l.grams, l.ts, l.place, l.memo)).join('');
    return;
  }
  const logs = res.results.map(p => ({
    name: p.properties['コーヒーの名前']?.title?.[0]?.plain_text || '',
    grams: p.properties['使用グラム']?.number || null,
    ts: p.properties['記録日時']?.date?.start || p.created_time,
    place: p.properties['飲んだ場所']?.select?.name || '',
    memo: p.properties['ひとことメモ']?.rich_text?.[0]?.plain_text || ''
  }));
  document.getElementById('log-sub').textContent = logs.length + '+ records';
  if (!logs.length) { el.innerHTML = '<div class="empty"><div class="empty-icon">📝</div><div class="empty-txt">No logs yet</div></div>'; return; }
  el.innerHTML = logs.map(l => logCardHTML(l.name, l.grams, l.ts, l.place, l.memo)).join('');
}

function logCardHTML(name, grams, ts, place, memo) {
  const d = new Date(ts);
  const ds = `${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
  return `<div class="log-card">
    <div class="lc-top"><div class="lc-name">${name}</div>${grams?`<div class="lc-g">${grams}<sub>g</sub></div>`:''}</div>
    <div class="lc-meta">${[ds,place].filter(Boolean).join(' · ')}</div>
    ${memo?`<div class="lc-memo">${memo}</div>`:''}
  </div>`;
}

document.getElementById('btn-record').addEventListener('click', async () => {
  const bean = selectedBeanId ? stockData.find(b => b.id === selectedBeanId) : null;
  const name = bean ? bean.name : document.getElementById('log-free').value.trim();
  if (!name) { showToast('Bean name is required'); return; }
  const grams = parseInt(document.getElementById('log-g').value) || null;
  const memo  = document.getElementById('log-memo').value.trim();
  const entry = { id: 'l'+Date.now(), name, memo, grams, place: selectedPlace, ts: new Date().toISOString(),
    roaster: bean?.roaster||'', roastLevel: bean?.roastLevel||'', process: bean?.process||'' };

  // 1. 在庫から引く → Notion更新
  if (bean && grams) {
    const newG = Math.max(0, (bean.remainGrams || 0) - grams);
    const pct = newG / bean.totalGrams;
    const status = pct <= 0 ? 'DONE' : pct <= 0.2 ? 'LOW' : 'IN STOCK';
    await updateStock(bean.id, newG, bean.memo, status);
    const idx = stockData.findIndex(b => b.id === bean.id);
    if (idx >= 0) { stockData[idx].remainGrams = newG; stockData[idx].status = status; }
  }

  // 2. Log → Notion & ローカルキャッシュ
  const btn = document.getElementById('btn-record');
  btn.textContent = 'SAVING...'; btn.classList.add('busy');
  const ok = await createLog(entry);
  btn.textContent = 'RECORD'; btn.classList.remove('busy');

  const cache = loadLogCache(); cache.unshift(entry); saveLogCache(cache);
  document.getElementById('log-g').value = '';
  document.getElementById('log-memo').value = '';
  document.getElementById('log-free').value = '';
  document.getElementById('log-sub').textContent = cache.length + ' records total';

  showToast(ok ? 'Saved to Notion ✓' : 'Saved locally');
  renderLogHist(); renderPicker();
  if (currentTab === 'stock') loadStock();
});

// ── NEW BEAN ──
document.getElementById('btn-add').addEventListener('click', async () => {
  const name = document.getElementById('n-name').value.trim();
  if (!name) { showToast('Bean name is required'); return; }
  const roasterFree = document.getElementById('n-roaster').value.trim();
  const bean = {
    name,
    roaster: roasterFree || 'obscura',
    roastDate: document.getElementById('n-date').value,
    totalGrams: parseInt(document.getElementById('n-g').value) || 200,
    roastLevel: document.getElementById('n-level').value,
    process: document.getElementById('n-process').value,
    memo: document.getElementById('n-memo').value.trim()
  };
  const btn = document.getElementById('btn-add');
  btn.textContent = 'SAVING...'; btn.classList.add('busy');
  const ok = await createStock(bean);
  btn.textContent = 'ADD TO STOCK'; btn.classList.remove('busy');
  if (!ok) { showToast('追加失敗 — トークンを確認'); return; }
  ['n-name','n-g','n-memo','n-roaster'].forEach(id => document.getElementById(id).value = '');
  ['n-level','n-process'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('n-date').value = new Date().toISOString().split('T')[0];
  showToast('Added to Notion ✓');
  go('stock');
});

// ── DONE ──
async function loadDone() {
  const el = document.getElementById('done-list');
  el.innerHTML = skeletonHTML();
  if (!getToken()) { el.innerHTML = '<div class="empty"><div class="empty-txt">Notionトークンを設定してください</div></div>'; return; }
  const beans = await fetchDone();
  if (!beans) { el.innerHTML = '<div class="empty"><div class="empty-txt">接続エラー</div></div>'; return; }
  if (!beans.length) { el.innerHTML = '<div class="empty"><div class="empty-icon">📦</div><div class="empty-txt">Nothing archived yet</div></div>'; return; }
  el.innerHTML = beans.map(b => `
    <div class="done-card">
      <div class="done-name">${b.name}</div>
      <div class="done-meta">${[b.roaster,b.roastLevel,b.process,b.totalGrams+'g'].filter(Boolean).join(' · ')}</div>
      ${b.memo?`<div class="done-memo">${b.memo}</div>`:''}
      <div class="done-acts">
        <button class="btn-restore" onclick="restoreBean('${b.id}','${b.totalGrams}')">↩ Restore</button>
        <button class="btn-del" onclick="delBean('${b.id}')">🗑 Delete</button>
      </div>
    </div>`).join('');
}

async function restoreBean(id, totalGrams) {
  const ok = await updateStock(id, parseInt(totalGrams)||200, '', 'IN STOCK');
  if (ok) { loadDone(); showToast('Restored to stock'); }
  else showToast('更新失敗');
}

async function delBean(id) {
  if (!confirm('この豆を削除しますか？')) return;
  const ok = await deleteStock(id);
  if (ok) { loadDone(); showToast('Deleted'); }
  else showToast('削除失敗');
}

// ── TOAST ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ── INIT ──
document.getElementById('n-date').value = new Date().toISOString().split('T')[0];
updateNStatus();
loadStock();
</script>
